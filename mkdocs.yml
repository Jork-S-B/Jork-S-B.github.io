# жҗңзҙўж ҸеҸідҫ§gitй“ҫжҺҘ
repo_url: https://github.com/Jork-S-B/Jork-S-B.github.io/tree/main
repo_name: "myblog"

theme:
  # favicon: logo.png  # зҪ‘з«ҷlogoпјҢй»ҳи®Өд»Һ./docs/logo.pngиҜ»еҸ–
  icon:
    logo: fontawesome/solid/face-smile-wink  # site_nameе·Ұдҫ§еӣҫж Ү
    repo: fontawesome/brands/git-alt  # gitй“ҫжҺҘеӣҫж Ү
  font: false  # дҪҝз”Ёй»ҳи®Өеӯ—дҪ“пјҢдёҚдҪҝз”Ёgoogle font
  name: 'material'  # и®ҫзҪ®mkdocs-materialдё»йўҳпјҢйңҖиҰҒе…Ҳpip install mkdocs-material
  language: zh
  features:
    - navigation.footer  # и®ҫзҪ®дёҠдёҖйЎөе’ҢдёӢдёҖйЎө
    - navigation.top  # дёҖй”®еӣһйЎ¶йғЁ
    - navigation.tabs  # йЎ¶йғЁжҳҫзӨәеҜјиҲӘйЎ¶еұӮnav
    - navigation.instant  # зӮ№еҮ»еҶ…йғЁй“ҫжҺҘж—¶пјҢдёҚз”Ёе…ЁйғЁеҲ·ж–°йЎөйқў
    # - navigation.path  # еұ•зӨәеҪ“еүҚж–ҮжЎЈи·Ҝеҫ„
    - content.code.copy  # д»Јз Ғеқ—еӨҚеҲ¶жҢүй’®
  palette:
    # еҲҮжҚўж ·ејҸж–№жЎҲеҸҠжҢүй’®
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/lightbulb
        name: еҲҮжҚўиҮіж·ұиүІжЁЎејҸ

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/lightbulb-outline
        name: еҲҮжҚўиҮіжө…иүІжЁЎејҸ

