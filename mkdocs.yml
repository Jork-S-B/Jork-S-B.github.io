markdown_extensions:
  # mkdocsиҮӘеёҰзҡ„mermaidжҸ’д»¶
  - pymdownx.superfences:
     custom_fences:
       - name: mermaid
         class: mermaid
         format: !!python/name:pymdownx.superfences.fence_code_format
  # mermaid2пјҢз¬¬дёүж–№жҸ’д»¶й…ҚеҘ—й…ҚзҪ®
#   - pymdownx.superfences:
#       custom_fences:
#         - name: mermaid
#           class: mermaid
#           format: !!python/name:mermaid2.fence_mermaid
  # emojiзӯүеӣҫж Үзҡ„жү©еұ•
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # еҸҜеҲҮжҚўtabйЎөзҡ„д»Јз Ғеқ—жү©еұ•
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  # жҸҗзӨәжЎҶжү©еұ•
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  # иЎЁж јжү©еұ•
  - tables
  # ж”ҜжҢҒmarkdownд»»еҠЎеҲ—иЎЁзҡ„жҸ’д»¶
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  # еӣҫзүҮж”ҫеӨ§жҸ’д»¶пјҢйңҖиҰҒе…Ҳpip install mkdocs-glightbox
  - glightbox
  # mermaidеӣҫдё“з”ЁжҸ’д»¶
  - panzoom:
      full_screen: True
      key: "none"
#   - mermaid2
  # дёӯж–ҮжҗңзҙўжҸ’д»¶пјҢйңҖиҰҒpip install jieba
  - search:
      # жӯЈеҲҷиЎЁиҫҫејҸпјҢ\s еҢ№й…Қд»»дҪ•з©әзҷҪеӯ—з¬ҰпјҢеҢ…жӢ¬з©әж јгҖҒеҲ¶иЎЁз¬ҰгҖҒжҚўиЎҢз¬Ұзӯүпјӣ\u200b дёҚеҸҜи§Ҷзҡ„зү№ж®ҠеҚ дҪҚз¬ҰпјҢж–Үжң¬жёІжҹ“ж—¶з”ЁеҲ°пјҢжӯӨеӨ„е®һжөӢеҜ№жҗңзҙўз»“жһңжҢәеӨ§
      separator: '[\s+\u200b\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
      lang:
        - en
        - zh
  # жҳҫзӨәж–Үд»¶жңҖеҗҺдҝ®ж”№ж—¶й—ҙжҸ’д»¶пјҢйңҖиҰҒе…Ҳpip install mkdocs-git-revision-date-localized-plugin
  # еҸӮиҖғиө„ж–ҷпјҡhttps://timvink.github.io/mkdocs-git-revision-date-localized-plugin/options/
  # и°ғиҜ•ж—¶жіЁйҮҠжҺү
#   - git-revision-date-localized:
#       timezone: Asia/Shanghai
#       type: iso_datetime
#       # fallback_to_build_date: true  # mkdocs buildзҡ„ж—Ҙжңҹ
#       enable_creation_date: false
#       exclude: # д»ҘдёӢж–Үд»¶/зӣ®еҪ•жҺ’йҷӨ
#         - index.md